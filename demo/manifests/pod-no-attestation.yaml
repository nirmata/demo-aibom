# Pod with an unattested image — blocked by require-aibom-attestation policy.
# Expected result: admission denied with message:
#   "Image must have a valid AIBOM attestation (https://nirmata.com/aibom/v1)."
apiVersion: v1
kind: Pod
metadata:
  name: research-agent-no-attest
  namespace: default
spec:
  containers:
    - name: agent
      # Arbitrary public image — no cosign AIBOM attestation attached.
      image: nginx:latest
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
